name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            os: linux
            arch: aarch64
          - target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install latest LLVM + patchelf (Linux)
        if: matrix.os == 'linux'
        run: |
          # apt.llvm.org の公式スクリプトで最新安定の LLVM を入れる．
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh all  # 最新安定 (LLVM 21+ 想定)
          sudo apt-get install -y pkg-config patchelf
          # スクリプトが入れた llvm-config-<N> を解決
          LLVM_VER=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1 | sed 's/.*-//')
          echo "Installed LLVM: $LLVM_VER"
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-$LLVM_VER 100

      - name: Install libclang (macOS)
        if: matrix.os == 'darwin'
        run: xcrun --find clang

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary at canonical path for dist.sh
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/cclint target/release/cclint

      - name: Build distribution tarball
        run: ./scripts/dist.sh dist

      - name: Show distribution
        run: |
          ls -la dist/
          echo "---"
          tar -tzf dist/cclint-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cclint-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/cclint-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Compute checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
