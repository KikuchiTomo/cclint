name: CI

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: ${{ matrix.os }} / rust ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Install latest LLVM (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh all
          sudo apt-get install -y pkg-config
          LLVM_VER=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1 | sed 's/.*-//')
          echo "Installed LLVM: $LLVM_VER"
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-$LLVM_VER 100

      - name: Install libclang (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: xcrun --find clang

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: make build

      - name: Test (rust)
        run: make test-rust

      - name: Test (positive fixtures - 期待した違反が出る)
        run: make test-fixtures

      - name: Test (negative fixtures - 誤検出が無い)
        run: make test-fixtures-clean
